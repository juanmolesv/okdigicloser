<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" />
  <circle cx="60" cy="60" r="58" fill="url(#faceGlow)" />

  <!-- Subtle ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5" />

  <!-- Face base — slightly lighter oval -->
  <ellipse cx="60" cy="62" rx="30" ry="32" fill="white" fill-opacity="0.12" />

  <!-- Left eye -->
  <ellipse cx="46" cy="54" rx="6" ry="6.5" fill="white" />
  <circle cx="47" cy="53" r="2.5" fill="#1E3A5F" />
  <circle cx="48.5" cy="51.5" r="1" fill="white" />

  <!-- Right eye -->
  <ellipse cx="74" cy="54" rx="6" ry="6.5" fill="white" />
  <circle cx="75" cy="53" r="2.5" fill="#1E3A5F" />
  <circle cx="76.5" cy="51.5" r="1" fill="white" />

  <!-- Friendly smile -->
  <path d="M 46 70 Q 60 82 74 70" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" />

  <!-- Small AI circuit accents -->
  <circle cx="35" cy="40" r="1.5" fill="white" fill-opacity="0.5" />
  <line x1="35" y1="40" x2="28" y2="34" stroke="white" stroke-opacity="0.3" stroke-width="1" />
  <circle cx="28" cy="34" r="1" fill="white" fill-opacity="0.35" />

  <circle cx="85" cy="40" r="1.5" fill="white" fill-opacity="0.5" />
  <line x1="85" y1="40" x2="92" y2="34" stroke="white" stroke-opacity="0.3" stroke-width="1" />
  <circle cx="92" cy="34" r="1" fill="white" fill-opacity="0.35" />

  <!-- Antenna / AI indicator dot -->
  <line x1="60" y1="28" x2="60" y2="18" stroke="white" stroke-opacity="0.5" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="60" cy="16" r="3" fill="white" fill-opacity="0.8" />
  <circle cx="60" cy="16" r="1.5" fill="#3B82F6" />
</svg>
